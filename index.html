<!-- =========================
FILE: index.html - Kenali Dirimu with Multiplayer
========================= -->
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kenali Dirimu - Multiplayer</title>

  <!-- Font Poppins -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Poppins',sans-serif;
  min-height:100vh;
  background:
    linear-gradient(
      135deg,
      #dbeafe,
      #ede9fe,
      #ffffff
    );

  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  position:relative;
}

.background-blur{
  position:absolute;
  width:500px;
  height:500px;
  background:#c4b5fd;
  filter:blur(150px);
  opacity:0.4;
  border-radius:50%;
}

.game-container{
  width:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

/* =========================
SETUP SCREEN
========================= */

.setup-screen{
  background:white;
  border-radius:30px;
  padding:40px;
  box-shadow:0 20px 40px rgba(0,0,0,0.15);
  text-align:center;
  max-width:500px;
}

.setup-screen h1{
  color:#6d28d9;
  font-size:36px;
  margin-bottom:10px;
}

.setup-screen p{
  color:#666;
  margin-bottom:30px;
}

.player-count-btn{
  padding:15px 30px;
  margin:10px;
  border:2px solid #ddd;
  background:white;
  border-radius:15px;
  font-size:18px;
  cursor:pointer;
  transition:0.3s;
  font-weight:600;
}

.player-count-btn:hover{
  background:#f0f0f0;
  border-color:#8b5cf6;
}

.player-count-btn.active{
  background:linear-gradient(135deg,#60a5fa,#8b5cf6);
  color:white;
  border-color:#8b5cf6;
}

.input-group{
  margin:20px 0;
  text-align:left;
}

.input-group label{
  display:block;
  margin-bottom:8px;
  color:#333;
  font-weight:600;
}

.input-group input{
  width:100%;
  padding:12px;
  border:2px solid #ddd;
  border-radius:10px;
  font-size:16px;
  font-family:'Poppins',sans-serif;
}

.start-btn{
  width:100%;
  padding:15px;
  margin-top:20px;
  border:none;
  border-radius:15px;
  background:linear-gradient(135deg,#60a5fa,#8b5cf6);
  color:white;
  font-size:18px;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
}

.start-btn:hover{
  transform:scale(1.02);
}

.hidden{
  display:none;
}

/* =========================
BOARD
========================= */

.board{
  position:relative;
  width:850px;
  height:850px;
  background:rgba(255,255,255,0.3);
  border:3px solid rgba(255,255,255,0.5);
  backdrop-filter:blur(12px);
  border-radius:30px;
  box-shadow:0 20px 40px rgba(0,0,0,0.15);
}

/* =========================
TILES
========================= */

.tile{
  position:absolute;
  width:120px;
  height:120px;
  border-radius:20px;
  padding:10px;
  color:#333;
  font-size:13px;
  font-weight:600;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  transition:0.3s;
  box-shadow:0 8px 15px rgba(0,0,0,0.1);
}

.tile:hover{
  transform:translateY(-5px) scale(1.03);
  box-shadow:
    0 0 20px rgba(255,255,255,0.9),
    0 10px 20px rgba(0,0,0,0.15);
}

/* Warna pastel berbeda */
.tile:nth-child(1){ background:#fde68a; }
.tile:nth-child(2){ background:#bfdbfe; }
.tile:nth-child(3){ background:#ddd6fe; }
.tile:nth-child(4){ background:#fecdd3; }
.tile:nth-child(5){ background:#bbf7d0; }
.tile:nth-child(6){ background:#fbcfe8; }
.tile:nth-child(7){ background:#a5f3fc; }
.tile:nth-child(8){ background:#fef3c7; }
.tile:nth-child(9){ background:#c7d2fe; }
.tile:nth-child(10){ background:#fecaca; }
.tile:nth-child(11){ background:#d9f99d; }
.tile:nth-child(12){ background:#ddd6fe; }
.tile:nth-child(13){ background:#bfdbfe; }
.tile:nth-child(14){ background:#f5d0fe; }
.tile:nth-child(15){ background:#bae6fd; }
.tile:nth-child(16){ background:#fde68a; }
.tile:nth-child(17){ background:#fecdd3; }
.tile:nth-child(18){ background:#bbf7d0; }
.tile:nth-child(19){ background:#ddd6fe; }
.tile:nth-child(20){ background:#fbcfe8; }

/* =========================
CENTER PANEL
========================= */

.center-panel{
  position:absolute;
  width:420px;
  height:420px;
  background:rgba(255,255,255,0.75);
  border-radius:30px;

  top:50%;
  left:50%;
  transform:translate(-50%,-50%);

  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;

  padding:25px;

  box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

.center-panel h1{
  font-size:42px;
  color:#6d28d9;
  margin-bottom:10px;
}

.subtitle{
  color:#555;
  margin-bottom:20px;
}

.current-player{
  background:linear-gradient(135deg,#818cf8,#c084fc);
  color:white;
  padding:10px 20px;
  border-radius:15px;
  font-size:16px;
  margin-bottom:15px;
  font-weight:600;
}

.score-box{
  background:linear-gradient(135deg,#818cf8,#c084fc);
  color:white;
  padding:15px 30px;
  border-radius:20px;
  font-size:18px;
  margin-bottom:20px;
  font-weight:600;
}

.score-box span{
  display:block;
  font-size:34px;
  margin-top:5px;
}

.dice{
  width:90px;
  height:90px;
  background:white;
  border-radius:20px;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:45px;
  margin:auto;
  box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

#rollBtn{
  margin-top:18px;
  padding:14px 28px;
  border:none;
  border-radius:15px;
  background:linear-gradient(135deg,#60a5fa,#8b5cf6);
  color:white;
  font-size:16px;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
}

#rollBtn:hover{
  transform:scale(1.05);
}

#rollBtn:disabled{
  opacity:0.5;
  cursor:not-allowed;
}

.dice-result{
  margin-top:20px;
  font-size:20px;
  font-weight:600;
}

/* =========================
PLAYERS INFO SIDEBAR
========================= */

.players-sidebar{
  position:absolute;
  right:20px;
  top:20px;
  background:rgba(255,255,255,0.9);
  padding:20px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
  max-height:500px;
  overflow-y:auto;
  min-width:200px;
}

.players-sidebar h3{
  color:#6d28d9;
  margin-bottom:15px;
}

.player-info{
  padding:10px;
  margin:8px 0;
  border-radius:10px;
  background:#f5f5f5;
  border-left:4px solid #60a5fa;
  font-size:14px;
}

.player-info.active{
  background:linear-gradient(135deg,#fef3c7,#fef08a);
  border-left-color:#f59e0b;
  font-weight:600;
}

.player-name{
  font-weight:600;
  color:#333;
}

.player-score{
  color:#666;
  font-size:12px;
}

/* =========================
PLAYER TOKENS
========================= */

.player{
  position:absolute;
  width:28px;
  height:28px;
  border-radius:50%;
  border:3px solid white;
  transition:
    top 0.45s ease,
    left 0.45s ease;

  z-index:10;
  box-shadow:0 0 15px rgba(0,0,0,0.3);
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  font-weight:bold;
  font-size:12px;
}

.player.p1{ background:#ef4444; }
.player.p2{ background:#3b82f6; }
.player.p3{ background:#10b981; }
.player.p4{ background:#f59e0b; }
.player.p5{ background:#ec4899; }
.player.p6{ background:#8b5cf6; }

/* =========================
MODAL
========================= */

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);

  display:flex;
  justify-content:center;
  align-items:center;

  z-index:100;
}

.modal-content{
  width:90%;
  max-width:500px;

  background:white;
  border-radius:25px;
  padding:30px;

  animation:popup 0.3s ease;
}

@keyframes popup{
  from{
    transform:scale(0.8);
    opacity:0;
  }
  to{
    transform:scale(1);
    opacity:1;
  }
}

.modal-content h2{
  color:#7c3aed;
  margin-bottom:20px;
}

.modal-content p{
  margin-bottom:20px;
  line-height:1.6;
}

textarea{
  width:100%;
  height:120px;
  resize:none;
  border-radius:15px;
  border:2px solid #ddd;
  padding:15px;
  font-family:'Poppins',sans-serif;
  margin-bottom:20px;
}

#submitAnswer{
  width:100%;
  padding:14px;
  border:none;
  border-radius:15px;
  background:linear-gradient(135deg,#60a5fa,#8b5cf6);
  color:white;
  font-size:16px;
  font-weight:600;
  cursor:pointer;
}

#skipQuestion{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:2px solid #ddd;
  background:white;
  border-radius:15px;
  color:#666;
  font-size:14px;
  cursor:pointer;
}

/* =========================
GAME OVER SCREEN
========================= */

.game-over-screen{
  background:white;
  border-radius:30px;
  padding:40px;
  box-shadow:0 20px 40px rgba(0,0,0,0.15);
  text-align:center;
  max-width:600px;
}

.game-over-screen h1{
  color:#6d28d9;
  font-size:36px;
  margin-bottom:20px;
}

.leaderboard{
  margin:30px 0;
  text-align:left;
}

.leaderboard-item{
  display:flex;
  justify-content:space-between;
  padding:15px;
  margin:10px 0;
  background:#f5f5f5;
  border-radius:10px;
  font-size:16px;
  font-weight:600;
}

.leaderboard-item .rank{
  color:#8b5cf6;
  min-width:30px;
}

.restart-btn{
  padding:15px 30px;
  margin-top:20px;
  border:none;
  border-radius:15px;
  background:linear-gradient(135deg,#60a5fa,#8b5cf6);
  color:white;
  font-size:18px;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
}

.restart-btn:hover{
  transform:scale(1.02);
}

/* =========================
CONFETTI
========================= */

.confetti{
  position:fixed;
  width:10px;
  height:10px;
  top:-10px;
  animation:fall linear forwards;
}

@keyframes fall{
  to{
    transform:translateY(100vh) rotate(720deg);
    opacity:0;
  }
}

/* =========================
RESPONSIVE
========================= */

@media(max-width:1100px){

  .players-sidebar{
    right:10px;
    top:10px;
    min-width:150px;
    max-height:300px;
  }
}

@media(max-width:900px){

  .board{
    width:95vw;
    height:95vw;
  }

  .tile{
    width:16vw;
    height:16vw;
    font-size:10px;
  }

  .center-panel{
    width:48vw;
    height:48vw;
    padding:15px;
  }

  .center-panel h1{
    font-size:5vw;
  }

  .dice{
    width:60px;
    height:60px;
    font-size:30px;
  }

  #rollBtn{
    padding:10px 16px;
    font-size:13px;
  }

  .players-sidebar{
    position:static;
    margin-top:20px;
    width:100%;
    max-height:150px;
  }

}
  </style>
</head>
<body>

  <!-- Background Blur -->
  <div class="background-blur"></div>

  <!-- SETUP SCREEN -->
  <div class="setup-screen" id="setupScreen">
    <h1>🎮 Kenali Dirimu</h1>
    <p>Board Game Refleksi Mental Remaja</p>

    <p style="margin-bottom:20px; font-size:14px; color:#666;">Berapa pemain?</p>
    <div>
      <button class="player-count-btn active" data-players="1">1 Pemain</button>
      <button class="player-count-btn" data-players="2">2 Pemain</button>
      <button class="player-count-btn" data-players="3">3 Pemain</button>
      <button class="player-count-btn" data-players="4">4 Pemain</button>
      <button class="player-count-btn" data-players="5">5 Pemain</button>
      <button class="player-count-btn" data-players="6">6 Pemain</button>
    </div>

    <div id="playerInputs"></div>

    <button class="start-btn" id="startGameBtn">Mulai Permainan</button>
    <button class="start-btn" style="background:#999; margin-top:10px;" id="resetBtn">Reset</button>
  </div>

  <!-- GAME SCREEN -->
  <div class="game-container hidden" id="gameScreen">

    <!-- BOARD -->
    <div class="board" id="board">

      <!-- CENTER -->
      <div class="center-panel">
        <h1>Kenali Dirimu</h1>
        
        <div class="current-player" id="currentPlayer">Pemain 1</div>

        <div class="score-box">
          Poin: <span id="score">0</span>
        </div>

        <div class="dice-area">
          <div class="dice" id="dice">🎲</div>
          <button id="rollBtn">Lempar Dadu</button>
        </div>

        <div class="dice-result">
          Hasil: <span id="diceResult">-</span>
        </div>
      </div>

    </div>

    <!-- PLAYERS INFO SIDEBAR -->
    <div class="players-sidebar" id="playersSidebar">
      <h3>📊 Skor Pemain</h3>
      <div id="playersInfo"></div>
    </div>

  </div>

  <!-- QUESTION MODAL -->
  <div class="modal hidden" id="questionModal">
    <div class="modal-content">

      <h2>Refleksi Diri</h2>

      <p id="questionText"></p>

      <textarea
        id="answerInput"
        placeholder="Tuliskan jawabanmu di sini..."
      ></textarea>

      <button id="submitAnswer">Jawaban Berhasil ✓</button>
      <button id="skipQuestion">Lewati Pertanyaan</button>

    </div>
  </div>

  <!-- GAME OVER SCREEN -->
  <div class="setup-screen hidden" id="gameOverScreen">
    <h1>🏆 Permainan Selesai!</h1>
    <div class="leaderboard" id="leaderboard"></div>
    <button class="restart-btn" id="playAgainBtn">Main Lagi</button>
  </div>

  <!-- CONFETTI -->
  <div id="confetti-container"></div>

  <!-- SOUND -->
  <audio id="moveSound">
    <source src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3" type="audio/mpeg">
  </audio>

  <audio id="pointSound">
    <source src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3" type="audio/mpeg">
  </audio>

  <script>
// =========================
// SETUP SCREEN
// =========================

const setupScreen = document.getElementById("setupScreen");
const gameScreen = document.getElementById("gameScreen");
const gameOverScreen = document.getElementById("gameOverScreen");

let selectedPlayers = 1;
let players = [];
let currentPlayerIndex = 0;
let totalTiles = 20;
let roundsCompleted = 0;
const maxRounds = 3;

// Player count selection
document.querySelectorAll(".player-count-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".player-count-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    selectedPlayers = parseInt(btn.dataset.players);
    updatePlayerInputs();
  });
});

function updatePlayerInputs() {
  const playerInputs = document.getElementById("playerInputs");
  playerInputs.innerHTML = "";
  
  for (let i = 1; i <= selectedPlayers; i++) {
    const div = document.createElement("div");
    div.className = "input-group";
    div.innerHTML = `
      <label>Nama Pemain ${i}</label>
      <input type="text" id="player${i}Name" placeholder="Masukkan nama...">
    `;
    playerInputs.appendChild(div);
  }
}

document.getElementById("startGameBtn").addEventListener("click", () => {
  players = [];
  
  for (let i = 1; i <= selectedPlayers; i++) {
    const nameInput = document.getElementById(`player${i}Name`);
    const playerName = nameInput.value.trim() || `Pemain ${i}`;
    
    players.push({
      name: playerName,
      position: 0,
      score: 0,
      id: i,
      color: `p${i}`
    });
  }
  
  startGame();
});

document.getElementById("resetBtn").addEventListener("click", () => {
  location.reload();
});

updatePlayerInputs();

// =========================
// GAME INITIALIZATION
// =========================

function startGame() {
  setupScreen.classList.add("hidden");
  gameScreen.classList.remove("hidden");
  currentPlayerIndex = 0;
  roundsCompleted = 0;
  
  createBoard();
  updateUI();
}

// =========================
// CREATE BOARD & PLAYERS
// =========================

const board = document.getElementById("board");
const positions = [
  [10,10], [150,10], [290,10], [430,10], [570,10], [710,10],
  [710,150], [710,290], [710,430], [710,570],
  [710,710], [570,710], [430,710], [290,710], [150,710], [10,710],
  [10,570], [10,430], [10,290], [10,150],
];

function createBoard() {
  board.innerHTML = "";
  
  for(let i = 0; i < totalTiles; i++){
    const tile = document.createElement("div");
    tile.classList.add("tile");
    tile.innerHTML = `<span>Kotak ${i + 1}</span>`;
    tile.style.left = positions[i][0] + "px";
    tile.style.top = positions[i][1] + "px";
    board.appendChild(tile);
  }
  
  // Create player tokens
  players.forEach(player => {
    const playerEl = document.createElement("div");
    playerEl.classList.add("player", player.color);
    playerEl.id = `player-${player.id}`;
    playerEl.textContent = player.id;
    playerEl.style.left = positions[0][0] + 45 + "px";
    playerEl.style.top = positions[0][1] + 45 + "px";
    board.appendChild(playerEl);
  });
  
  // Create center panel
  const centerPanel = document.createElement("div");
  centerPanel.classList.add("center-panel");
  centerPanel.innerHTML = `
    <h1>Kenali Dirimu</h1>
    <div class="current-player" id="currentPlayer">Pemain 1</div>
    <div class="score-box">Poin: <span id="score">0</span></div>
    <div class="dice-area">
      <div class="dice" id="dice">🎲</div>
      <button id="rollBtn">Lempar Dadu</button>
    </div>
    <div class="dice-result">Hasil: <span id="diceResult">-</span></div>
  `;
  board.appendChild(centerPanel);
  
  document.getElementById("rollBtn").addEventListener("click", rollDice);
}

// =========================
// QUESTIONS
// =========================

const questions = [
  "Apa hal yang paling membuatmu bangga pada dirimu?",
  "Kapan terakhir kali kamu merasa benar-benar didengarkan?",
  "Apa yang biasanya kamu lakukan saat stres?",
  "Hal apa yang ingin kamu perbaiki dari dirimu?",
  "Apa arti bahagia menurutmu?",
  "Siapa orang yang paling membuatmu nyaman?",
  "Apa ketakutan terbesar yang pernah kamu sembunyikan?",
  "Bagaimana cara kamu menenangkan diri saat sedih?",
  "Apa pencapaian kecil yang membuatmu senang?",
  "Apa yang ingin kamu katakan pada dirimu 5 tahun lalu?",
  "Apa hal kecil yang membuat harimu lebih baik?",
  "Kapan terakhir kali kamu merasa sangat percaya diri?",
  "Apa yang paling kamu syukuri hari ini?",
  "Apa yang membuatmu merasa aman?",
  "Bagaimana hubunganmu dengan dirimu sendiri?",
  "Apa emosi yang paling sering kamu rasakan akhir-akhir ini?",
  "Apa yang biasanya membuatmu overthinking?",
  "Apa cara favoritmu untuk healing?",
  "Apa mimpi terbesar yang ingin kamu capai?",
  "Apa kebiasaan buruk yang ingin kamu ubah?",
  "Apa hal yang paling kamu sukai dari kepribadianmu?",
  "Apa yang membuatmu merasa dicintai?",
  "Apa pengalaman yang paling membentuk dirimu?",
  "Apa yang paling sulit kamu ungkapkan?",
  "Apa arti persahabatan bagimu?",
  "Apa cara terbaik menurutmu untuk menghadapi kegagalan?",
  "Apa hal yang sering kamu sembunyikan dari orang lain?",
  "Bagaimana kamu menunjukkan kasih sayang?",
  "Apa yang membuatmu merasa berharga?",
  "Apa hal yang paling ingin kamu pelajari tentang dirimu?"
];

let lastQuestion = "";

function getRandomQuestion() {
  let question;
  do {
    question = questions[Math.floor(Math.random() * questions.length)];
  } while(question === lastQuestion);
  lastQuestion = question;
  return question;
}

// =========================
// DICE & MOVEMENT
// =========================

const rollBtn = document.getElementById("rollBtn");
const diceResult = document.getElementById("diceResult");

function rollDice() {
  rollBtn.disabled = true;

  let animationCount = 10;
  const interval = setInterval(() => {
    const randomFace = Math.floor(Math.random() * 6) + 1;
    diceResult.textContent = randomFace;
  }, 100);

  setTimeout(async () => {
    clearInterval(interval);
    const dice = Math.floor(Math.random() * 6) + 1;
    diceResult.textContent = dice;

    await movePlayer(dice);
    showQuestion();
    rollBtn.disabled = false;
  }, 1000);
}

async function movePlayer(steps) {
  const player = players[currentPlayerIndex];
  const moveSound = document.getElementById("moveSound");

  for(let i = 0; i < steps; i++){
    player.position++;
    if(player.position >= totalTiles){
      player.position = 0;
      roundsCompleted++;
      
      if(roundsCompleted >= maxRounds * selectedPlayers) {
        endGame();
        return;
      }
    }

    updatePlayerPosition(player);
    moveSound.currentTime = 0;
    moveSound.play();
    await delay(400);
  }
}

function updatePlayerPosition(player) {
  const playerEl = document.getElementById(`player-${player.id}`);
  playerEl.style.left = positions[player.position][0] + 45 + "px";
  playerEl.style.top = positions[player.position][1] + 45 + "px";
}

// =========================
// QUESTION MODAL
// =========================

const questionModal = document.getElementById("questionModal");
const questionText = document.getElementById("questionText");
const submitAnswer = document.getElementById("submitAnswer");
const skipQuestion = document.getElementById("skipQuestion");
const answerInput = document.getElementById("answerInput");
const scoreDisplay = document.getElementById("score");
const pointSound = document.getElementById("pointSound");

function showQuestion() {
  const question = getRandomQuestion();
  questionText.textContent = question;
  answerInput.value = "";
  questionModal.classList.remove("hidden");
}

submitAnswer.addEventListener("click", () => {
  if(answerInput.value.trim() === ""){
    alert("Yuk isi jawaban refleksimu dulu 😊");
    return;
  }

  awardPoints();
  nextPlayer();
  questionModal.classList.add("hidden");
});

skipQuestion.addEventListener("click", () => {
  nextPlayer();
  questionModal.classList.add("hidden");
});

function awardPoints() {
  const player = players[currentPlayerIndex];
  player.score += 10;
  
  scoreDisplay.textContent = player.score;
  pointSound.currentTime = 0;
  pointSound.play();
  
  createConfetti();
  animateScore();
  
  updateUI();
}

// =========================
// PLAYER TURN MANAGEMENT
// =========================

function nextPlayer() {
  currentPlayerIndex = (currentPlayerIndex + 1) % players.length;
  updateUI();
  
  if(roundsCompleted >= maxRounds * selectedPlayers) {
    setTimeout(endGame, 1000);
  }
}

function updateUI() {
  const currentPlayer = players[currentPlayerIndex];
  document.getElementById("currentPlayer").textContent = currentPlayer.name;
  scoreDisplay.textContent = currentPlayer.score;
  
  // Update players info sidebar
  const playersInfo = document.getElementById("playersInfo");
  playersInfo.innerHTML = players.map((p, idx) => `
    <div class="player-info ${idx === currentPlayerIndex ? 'active' : ''}">
      <div class="player-name">${p.name} <span style="color:#888;">[${idx + 1}]</span></div>
      <div class="player-score">Poin: ${p.score} | Posisi: ${p.position + 1}</div>
    </div>
  `).join("");
}

// =========================
// GAME END
// =========================

function endGame() {
  gameScreen.classList.add("hidden");
  gameOverScreen.classList.remove("hidden");
  
  // Sort players by score
  const sorted = [...players].sort((a, b) => b.score - a.score);
  
  const leaderboard = document.getElementById("leaderboard");
  leaderboard.innerHTML = sorted.map((p, idx) => `
    <div class="leaderboard-item">
      <span class="rank">${idx + 1}. ${p.name}</span>
      <span>${p.score} Poin</span>
    </div>
  `).join("");
  
  if(sorted[0].score > 0) {
    createConfetti();
  }
}

document.getElementById("playAgainBtn").addEventListener("click", () => {
  gameOverScreen.classList.add("hidden");
  setupScreen.classList.remove("hidden");
  updatePlayerInputs();
});

// =========================
// UTILITIES
// =========================

function delay(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

function animateScore() {
  scoreDisplay.style.transform = "scale(1.3)";
  scoreDisplay.style.transition = "0.3s";

  setTimeout(() => {
    scoreDisplay.style.transform = "scale(1)";
  }, 300);
}

function createConfetti() {
  const container = document.getElementById("confetti-container");

  for(let i = 0; i < 40; i++){
    const confetti = document.createElement("div");
    confetti.classList.add("confetti");
    confetti.style.left = Math.random() * window.innerWidth + "px";
    confetti.style.background = `hsl(${Math.random()*360},100%,70%)`;
    confetti.style.animationDuration = (Math.random() * 3 + 2) + "s";
    confetti.style.width = (Math.random() * 8 + 5) + "px";
    confetti.style.height = (Math.random() * 8 + 5) + "px";

    container.appendChild(confetti);

    setTimeout(() => {
      confetti.remove();
    }, 5000);
  }
}
  </script>
